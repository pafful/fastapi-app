name: Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube..."
          for i in {1..90}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status | grep -o '"status":"UP"' || true)
            if [ "$STATUS" == '"status":"UP"' ]; then
              echo "SonarQube is ready"
              break
            fi
            sleep 5
          done

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Create SonarQube Token
        run: |
          TOKEN=$(curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token" | jq -r '.token')

          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install Sonar Scanner
        run: |
          wget -qO- https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip > sonar.zip
          unzip sonar.zip
          sudo mv sonar-scanner-* /opt/sonar-scanner
          echo "/opt/sonar-scanner/bin" >> $GITHUB_PATH

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN

      # - name: Trivy FS Scan
      #   uses: aquasecurity/trivy-action@v0.35.0
      #   with:
      #     scan-type: fs
      #     format: table
      #     exit-code: 1
      #     severity: CRITICAL,HIGH
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
      


